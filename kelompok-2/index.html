<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Map Marker Kelompok 2</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header class="header">
    <div class="container">
      <h1>Map Marker</h1>
      <p>Kelompok 2 — Klik peta untuk menambahkan lokasi</p>
    </div>
  </header>

  <main class="container main-layout">
    
    <section class="map-section">
      <div id="map"></div>
    </section>

    <aside class="panel">
      <h2>Informasi</h2>

      <div class="info-item">
        <span>Jumlah Marker</span>
        <strong id="marker-count">0</strong>
      </div>

      <button id="resetBtn">Reset Marker</button>

    </aside>

  </main>

  <footer class="footer">
    <p>© 2026 Kelompok 2</p>
  </footer>

  <script src="storage.js"></script>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="map.js"></script>

</body>
</html>
