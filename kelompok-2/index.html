<!DOCTYPE html>
<!-- Aplikasi Peta Persebaran Masjid di Banda Aceh -->
<!-- Menampilkan lokasi dan informasi masjid menggunakan Leaflet Map -->
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Peta Persebaran Masjid - Banda Aceh & Aceh Besar</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="app-container">
    <!-- Header: Bagian atas berisi judul dan statistik masjid -->
    <header class="header">
      <div class="header-content">
        <div class="header-title">
          <i class="fas fa-mosque"></i>
          <h1>Persebaran Masjid</h1>
          <p>Banda Aceh & Aceh Besar</p>
        </div>
        <div class="header-stats">
          <div class="stat">
            <span class="stat-label">Total Masjid</span>
            <span class="stat-value" id="marker-count">0</span>
          </div>
        </div>
      </div>
    </header>

    <!-- Main Layout: Konten utama berisi peta dan sidebar -->
    <main class="main-content">
      <!-- Map Section: Bagian peta dengan legenda -->
      <section class="map-section">
        <div id="map"></div>
        <div class="map-legend">
          <div class="legend-item">
            <span class="legend-color mosque"></span>
            <span>Masjid</span>
          </div>
        </div>
      </section>

      <!-- Sidebar Panel: Panel samping berisi pencarian dan daftar masjid -->
      <aside class="sidebar">
        <!-- Header sidebar dengan judul dan input pencarian -->
        <div class="sidebar-header">
          <h2>Daftar Masjid</h2>
          <input type="text" id="searchInput" class="search-box" placeholder="Cari masjid...">
        </div>

        <!-- Container untuk daftar masjid yang dinamis -->
        <div class="mosque-list" id="mosqueList">
          <!-- List akan di-generate oleh JavaScript -->
        </div>

        <!-- Footer sidebar dengan tombol tampilkan semua masjid -->
        <div class="sidebar-footer">
          <!-- Tombol untuk menampilkan semua masjid di peta -->
          <button id="showAllBtn" class="btn-show-all">
            <i class="fas fa-map-pin"></i> Tampilkan Semua Masjid
          </button>
        </div>
      </aside>
    </main>
  </div>

  <!-- Script data koordinat masjid -->
  <script src="markers-data.js"></script>
  <!-- Script untuk mengelola local storage -->
  <script src="storage.js"></script>
  <!-- Library Leaflet untuk peta interaktif -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <!-- Script untuk inisialisasi dan konfigurasi peta -->
  <script src="map.js"></script>
  <!-- Script untuk menambahkan dan mengelola marker masjid -->
  <script src="marker.js"></script>

</body>
</html>
